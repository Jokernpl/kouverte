<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2d1b6e"/>
      <stop offset="60%" stop-color="#12082a"/>
      <stop offset="100%" stop-color="#0a0418"/>
    </radialGradient>
    <linearGradient id="hood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b1fa8"/>
      <stop offset="100%" stop-color="#1e0d50"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sfondo arrotondato per maskable -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow viola dietro -->
  <circle cx="256" cy="230" r="160" fill="#7c3aed" opacity="0.25" filter="url(#glow)"/>
  <!-- Corpo/mantello -->
  <ellipse cx="256" cy="370" rx="140" ry="105" fill="url(#hood)"/>
  <path d="M120 370 Q115 480 256 485 Q397 480 392 370" fill="#1e1050"/>
  <!-- Testa -->
  <circle cx="256" cy="230" r="100" fill="#2d1b6e"/>
  <!-- Cappuccio -->
  <path d="M150 200 Q155 110 256 100 Q357 110 362 200 Q325 170 256 165 Q187 170 150 200Z" fill="url(#hood)"/>
  <path d="M155 215 Q145 120 256 105 Q367 120 357 215" fill="none" stroke="#5b21b6" stroke-width="3"/>
  <!-- Ombra interna cappuccio -->
  <path d="M170 210 Q175 135 256 125 Q337 135 342 210 Q310 180 256 175 Q202 180 170 210Z" fill="#12082a" opacity="0.55"/>
  <!-- Occhi -->
  <circle cx="220" cy="240" r="25" fill="#fff"/>
  <circle cx="292" cy="240" r="25" fill="#fff"/>
  <circle cx="226" cy="244" r="13" fill="#12082a"/>
  <circle cx="298" cy="244" r="13" fill="#12082a"/>
  <!-- Riflessi occhi -->
  <circle cx="231" cy="237" r="5" fill="#fff"/>
  <circle cx="303" cy="237" r="5" fill="#fff"/>
  <!-- Picco cappuccio -->
  <path d="M230 105 Q256 65 282 105" fill="#1e0d50" stroke="#5b21b6" stroke-width="3"/>
  <!-- Stella decorativa -->
  <text x="380" y="155" font-size="38" fill="#fbbf24" filter="url(#glow)">★</text>
</svg>
