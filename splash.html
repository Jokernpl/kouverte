<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kouverte Vox - La voce non mente</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
    background: linear-gradient(135deg, #0a1f3d 0%, #001a4d 50%, #0a3d5c 100%);
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

/* Animated background */
.bg-animate {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0, 217, 255, 0.15), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 128, 255, 0.1), transparent 50%),
        linear-gradient(135deg, #0a1f3d 0%, #001a4d 50%, #0a3d5c 100%);
    animation: drift 8s ease-in-out infinite;
}

@keyframes drift {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.1); }
}

.container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 32px;
}

/* Logo */
.logo-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 12px;
    animation: fadeInDown 1s ease-out;
}

.logo-icon {
    font-size: 64px;
    animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

.logo-text {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #00d9ff, #0080ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
}

.tagline {
    font-size: 18px;
    color: #00d9ff;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.subtitle {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 8px;
}

/* Features */
.features {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
}

.feature {
    background: rgba(0, 217, 255, 0.08);
    border: 1px solid rgba(0, 217, 255, 0.2);
    border-radius: 16px;
    padding: 20px 12px;
    backdrop-filter: blur(20px);
    transition: all 0.3s ease;
    cursor: pointer;
    animation: fadeInUp 0.8s ease-out;
}

.feature:nth-child(2) { animation-delay: 0.1s; }
.feature:nth-child(3) { animation-delay: 0.2s; }

.feature:hover {
    background: rgba(0, 217, 255, 0.15);
    border-color: rgba(0, 217, 255, 0.4);
    transform: translateY(-4px);
}

.feature-icon {
    font-size: 32px;
    margin-bottom: 8px;
}

.feature-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #00d9ff;
    margin-bottom: 4px;
}

.feature-desc {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.3;
}

/* CTA Buttons */
.cta-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
    animation: fadeInUp 1s ease-out 0.3s both;
}

.btn {
    padding: 16px 28px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.btn-primary {
    background: linear-gradient(135deg, #00d9ff, #0080ff);
    color: #0a1f3d;
    box-shadow: 0 12px 32px rgba(0, 217, 255, 0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 40px rgba(0, 217, 255, 0.4);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background: transparent;
    color: #00d9ff;
    border: 2px solid rgba(0, 217, 255, 0.4);
}

.btn-secondary:hover {
    background: rgba(0, 217, 255, 0.08);
    border-color: rgba(0, 217, 255, 0.7);
}

/* Footer */
.footer {
    position: absolute;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
    z-index: 1;
}

.footer-link {
    color: #00d9ff;
    text-decoration: none;
}

.footer-link:hover {
    text-decoration: underline;
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 480px) {
    .logo-text { font-size: 40px; }
    .tagline { font-size: 14px; }
    .features { grid-template-columns: 1fr; }
    .cta-section { gap: 10px; }
    .btn { padding: 14px 24px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <!-- Logo & Tagline -->
    <div class="logo-section">
        <div class="logo-icon">🎙️</div>
        <div>
            <div class="logo-text">Kouverte Vox</div>
            <div class="tagline">La voce non mente</div>
        </div>
        <div class="subtitle">Solo voci. Niente foto.</div>
    </div>

    <!-- Features -->
    <div class="features">
        <div class="feature">
            <div class="feature-icon">🎤</div>
            <div class="feature-title">Registra</div>
            <div class="feature-desc">La tua voce<br>è tutto</div>
        </div>
        <div class="feature">
            <div class="feature-icon">💬</div>
            <div class="feature-title">Scopri</div>
            <div class="feature-desc">Nuove voci<br>ogni giorno</div>
        </div>
        <div class="feature">
            <div class="feature-icon">✨</div>
            <div class="feature-title">Connetti</div>
            <div class="feature-desc">Incontri<br>autentici</div>
        </div>
    </div>

    <!-- CTA Buttons -->
    <div class="cta-section">
        <button class="btn btn-primary" onclick="window.location.href='tg.html?mode=login'">
            ✨ Accedi
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='tg.html?mode=register'">
            Registrati Gratis
        </button>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>Made by <span class="footer-link">Kouverte</span> • Scarica l'app • © 2026</p>
</div>

</body>
</html>
